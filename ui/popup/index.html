<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nafer Shield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="nafer-app">
    <!-- Header: Premium Purple (Wappalyzer Style) -->
    <header class="header">
      <div class="header__logo">
        <img src="../../assets/icons/icon-32.png" alt="Nafer Shield" class="header__icon-img">
        <span class="header__title">Nafer Shield</span>
      </div>
      <div class="header__actions">
        <button id="btn-settings" class="header__btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content Grid -->
    <main class="main">
      <!-- Stats Overview -->
      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__value" id="stat-session">0</div>
          <div class="stat-card__label">On this page</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__value" id="stat-total">0</div>
          <div class="stat-card__label">Total blocked</div>
        </div>
      </section>

      <!-- Site Status -->
      <section class="site-status">
        <div class="site-status__info">
          <img id="site-favicon" class="site-status__favicon" src="../../assets/icons/icon-16.png" alt="">
          <span id="site-hostname" class="site-status__hostname">Loading...</span>
        </div>
        <div class="site-status__action">
          <label class="switch">
            <input type="checkbox" id="toggle-site" checked>
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <!-- Navigation Tabs (Uppercase Minimalist) -->
      <nav class="tabs">
        <button class="tabs__item active" data-tab="detections">DETECTIONS</button>
        <button class="tabs__item" data-tab="filters">FILTERS</button>
        <button class="tabs__item" data-tab="about">ABOUT</button>
      </nav>

      <!-- Tab Panels -->
      <div class="panels">
        <div class="panel active" id="panel-detections">
          <div class="empty-state" id="detections-empty">
            <p>No ads detected on this page.</p>
          </div>
          <ul class="detection-list" id="detection-list">
            <!-- Dynamic items -->
          </ul>
        </div>
        
        <div class="panel" id="panel-filters">
          <div class="filter-status">
            <p>Protection is active using <strong>5</strong> primary filter lists.</p>
            <button id="btn-manage-filters" class="btn-link">Manage Filter Lists</button>
          </div>
        </div>

        <div class="panel" id="panel-about">
          <div class="about-content">
            <p><strong>Nafer Shield v1.0.0</strong></p>
            <p class="muted">Developed by gtqn</p>
            <div class="social-links">
              <a href="https://discord.com/users/gtqn" target="_blank" class="btn-link">Discord Support</a>
              <a href="https://github.com/VueST/Nafer-Shield" target="_blank" class="btn-link">GitHub</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer Action -->
    <footer class="footer">
      <button id="btn-toggle-global" class="btn-primary">
        <span id="global-status-text">Shield is Active</span>
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
